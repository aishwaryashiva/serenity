{
  "security": {
    "allowedOrigins": [
      "https://localhost",
      "https://127.0.0.1",
      "https://example.com"
    ],
    "requireHttps": true,
    "allowLocalhost": true,
    "allowFileProtocol": false,
    "requireAuthentication": false,
    "authenticationToken": "",
    "blockedCommands": []
  },
  "system": {
    "enableShutdown": true,
    "enableRestart": true,
    "enableLogout": true,
    "enableLock": true,
    "enableSuspend": false,
    "enableHibernate": false,
    "enableVolumeControl": true,
    "enableBrightnessControl": true,
    "enableScreenshot": true,
    "maxCommandsPerMinute": 10,
    "commandTimeoutSeconds": 30
  }
}